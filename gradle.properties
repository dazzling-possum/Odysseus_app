# gradle.properties
# -------------------------------------------------------------------
# Global build settings read by Gradle for every build.
# -------------------------------------------------------------------

# Give the Gradle daemon enough memory for the Android build tools.
org.gradle.jvmargs=-Xmx2048m -Dfile.encoding=UTF-8

# Use AndroidX (the modern support libraries) instead of the old ones.
android.useAndroidX=true

# Kotlin code style.
kotlin.code.style=official

# Build features run in parallel where possible (faster builds).
org.gradle.parallel=true

# Generate only the resources we actually use.
android.nonTransitiveRClass=true
